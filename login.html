<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Incredible India</title>
    <link rel="stylesheet" href="india.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-login { background: #ff6b00; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; border-radius: 5px; }
    </style>
</head>
<body style="background: #f4f4f4;">
    <div class="login-container">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', document.getElementById('username').value);
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
